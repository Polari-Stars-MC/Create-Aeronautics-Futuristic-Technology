name: Cleanup Skipped Build Runs

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete skipped runs from target workflow
        uses: actions/github-script@v7
        env:
          TARGET_WORKFLOW_PATH: .github/workflows/build.yml
          TARGET_JOB_NAME: build
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetWorkflowPath = process.env.TARGET_WORKFLOW_PATH;
            const targetJobName = process.env.TARGET_JOB_NAME;

            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              {
                owner,
                repo,
                per_page: 100,
              }
            );

            const targetWorkflow = workflows.find((workflow) => workflow.path === targetWorkflowPath);

            if (!targetWorkflow) {
              core.setFailed(`Target workflow '${targetWorkflowPath}' was not found.`);
              return;
            }

            let runs = [];

            if (context.eventName === "workflow_run") {
              const currentRun = context.payload.workflow_run;
              if (currentRun.path !== targetWorkflowPath) {
                core.info(`Ignoring workflow_run for '${currentRun.path}'. Target is '${targetWorkflowPath}'.`);
                return;
              }
              runs = [currentRun];
            } else {
              runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id: targetWorkflow.id,
                  status: "completed",
                  per_page: 100,
                }
              );
            }

            for (const run of runs) {
              const jobs = await github.paginate(
                github.rest.actions.listJobsForWorkflowRun,
                {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                }
              );

              const buildJob = jobs.find((job) => job.name === targetJobName);

              if (!buildJob) {
                core.info(`Kept run ${run.id} because job '${targetJobName}' was not found.`);
                continue;
              }

              core.info(`Run ${run.id} job '${targetJobName}' conclusion: ${buildJob.conclusion}`);

              if (buildJob.conclusion === "skipped") {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                core.info(`Deleted run ${run.id} because job '${targetJobName}' was skipped.`);
                continue;
              }

              core.info(`Kept run ${run.id} because job '${targetJobName}' concluded '${buildJob.conclusion}'.`);
            }
