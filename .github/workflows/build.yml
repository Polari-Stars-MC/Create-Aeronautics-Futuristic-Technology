name: Build

on:
  push:

permissions:
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      COMMIT_MESSAGE: ${{ github.event.head_commit.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: BrycensRanch/read-properties-action@v1
        id: version
        with:
          file: gradle.properties
          property: mod_version
          default: 1.0.0

      - name: Debug version comparison
        shell: bash
        run: |
          mod_version="${{ steps.version.outputs.version }}"
          commit_message="${{ env.COMMIT_MESSAGE }}"

          echo "mod_version=[$mod_version]"
          echo "commit_message=[$commit_message]"
          echo "mod_version_length=${#mod_version}"
          echo "commit_message_length=${#commit_message}"

          if [ "$mod_version" = "$commit_message" ]; then
            echo "version_match=true"
          else
            echo "version_match=false"
          fi

      - name: Setup JDK 21
        if: steps.version.outputs.version == env.COMMIT_MESSAGE
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.version.outputs.version == env.COMMIT_MESSAGE
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        if: steps.version.outputs.version == env.COMMIT_MESSAGE
        run: chmod +x ./gradlew

      - name: Build with Gradle
        if: steps.version.outputs.version == env.COMMIT_MESSAGE
        run: ./gradlew build
