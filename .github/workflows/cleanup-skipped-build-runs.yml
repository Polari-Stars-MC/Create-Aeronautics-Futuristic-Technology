name: Cleanup Skipped Build Runs

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete run when build job was not executed
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            if (context.eventName !== "workflow_run") {
              core.info("Manual run detected. Cleanup only applies to workflow_run events.");
              return;
            }

            const runId = context.payload.workflow_run.id;

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner,
                repo,
                run_id: runId,
                per_page: 100,
              }
            );

            const buildJob = jobs.find((job) => job.name === "build");

            if (!buildJob) {
              core.info(`Workflow run ${runId} has no 'build' job. Deleting it.`);
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: runId,
              });
              return;
            }

            core.info(`Workflow run ${runId} build conclusion: ${buildJob.conclusion}`);

            if (buildJob.conclusion === "skipped") {
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: runId,
              });
              core.info(`Deleted workflow run ${runId} because the build job was skipped.`);
              return;
            }

            core.info(`Kept workflow run ${runId} because the build job executed with conclusion '${buildJob.conclusion}'.`);
