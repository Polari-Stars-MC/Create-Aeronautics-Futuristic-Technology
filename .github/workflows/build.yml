name: Build

on:
  push:

permissions:
  actions: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      mod_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: BrycensRanch/read-properties-action@v1
        id: version
        with:
          file: gradle.properties
          property: mod_version
          default: 1.0.0

  build:
    needs: check-version
    if: needs.check-version.outputs.mod_version == github.event.head_commit.message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

  cleanup-skipped-run:
    needs:
      - check-version
      - build
    if: always() && needs.build.result == 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Delete current workflow run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.deleteWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
