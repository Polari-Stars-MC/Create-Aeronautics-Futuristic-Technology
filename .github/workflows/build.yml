name: Build

on:
  push:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      mod_version: ${{ steps.check.outputs.mod_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check commit message against mod version
        id: check
        shell: bash
        run: |
          mod_version="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2- | tr -d '\r')"
          commit_message="${{ github.event.head_commit.message }}"

          echo "mod_version=$mod_version" >> "$GITHUB_OUTPUT"

          if [ "$commit_message" = "$mod_version" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skip build: commit message '$commit_message' does not match mod_version '$mod_version'."
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build
